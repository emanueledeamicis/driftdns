services:
  driftdns:
    image: driftdns:latest
    build: .
    container_name: driftdns
    ports:
      - "4000:3000"
    environment:
      - DRIFTDNS_SECRET=change-me-to-a-random-32-char-string
    volumes:
      - driftdns_data:/app/data
    restart: unless-stopped

volumes:
  driftdns_data:
